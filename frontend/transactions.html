<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIA Federal Credit Union - Transactions</title>
  <link rel="stylesheet" href="transactions.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>
<body>

  <!-- Header -->
  <header>
    <section class="nav-bar">
      <div class="hero-image">
        <a href="index.html">
          <img src="images/RIA_credit.png" alt="RIA Federal Credit Union" width="200" height="200">
        </a>
      </div>
      <button class="menu-toggle">&#9776;</button>
      <div class="nav">
        <ul>
          <li><a href="userdashboard.html">Dashboard</a></li>
          <li><a href="transfer.html">Transfers</a></li>
          <li><a href="">Settings</a></li>
          <li><a href="signin.html">Logout</a></li>
        </ul>
      </div>
    </section>
  </header>

  <!-- Main -->
  <main>

    <section class="user-overview">
      <h2>Transaction History</h2>
      <p>View all your account activity.</p>
    </section>

    <!-- Filters -->
    <section class="quick-actions">
      <h3>Filter Transactions</h3>
      <div class="actions-grid">
        <select id="filterType">
          <option value="">All Types</option>
          <option value="credit">Credit</option>
          <option value="debit">Debit</option>
        </select>
        <select id="filterStatus">
          <option value="">All Status</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
          <option value="failed">Failed</option>
        </select>
        <button onclick="applyFilters()">Apply Filter</button>
      </div>
    </section>

    <!-- Transactions Table -->
    <section class="recent-trans">
      <h3>All Transactions</h3>
      <table id="transactions">
        <thead>
          <tr>
            <th>Description</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Chat Widget -->
    <div id="chatWidget">
      <div id="chatIcon">💬<span id="newMsgBadge" style="display:none;">1</span></div>
      <div id="chatWindow">
        <div id="chatHeader">Support Chat
          <span id="closeChat" style="float:right;cursor:pointer;">✖</span>
        </div>
        <div id="messages"></div>
        <div id="inputContainer">
          <input type="text" id="messageInput" placeholder="Type a message" />
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <h4>Contact Us</h4>
      <p>Email: <a href="mailto:evergreen@support.com">evergreen@support.com</a></p>
      <p>&copy; 2026 RIA Federal Credit Union. All rights reserved.</p>
    </div>
  </footer>

  <!-- ✅ Socket.IO MUST load before any script that uses `socket` -->
  <script src="/socket.io/socket.io.js"></script>

  <script>
    // ── Nav toggle ──
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.nav');
    toggle.addEventListener('click', () => nav.classList.toggle('open'));

    // ── ✅ Get email from localStorage (not URL params — this is a user page) ──
    const userEmail = localStorage.getItem("userEmail");

    if (!userEmail) {
      alert("You are not logged in!");
      window.location.href = "signin.html";
    }

    // ── Transactions ──
    let allTransactions = [];

    async function loadTransactions() {
      try {
        // ✅ Use the user-specific endpoint, not the admin one
        const res = await fetch(`/api/transactions/${encodeURIComponent(userEmail)}`);
        const data = await res.json();
        if (data.success) {
          allTransactions = data.transactions || [];
          renderTransactions(allTransactions);
        }
      } catch (err) {
        console.error("Error fetching transactions:", err);
      }
    }

    function renderTransactions(transactions) {
      const tbody = document.querySelector("#transactions tbody");
      tbody.innerHTML = "";

      if (transactions.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:20px;color:#7a8fa6;">No transactions found.</td></tr>`;
        return;
      }

      transactions.forEach(tx => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${tx.description || "—"}</td>
          <td>${tx.type}</td>
          <td>$${Number(tx.amount).toLocaleString()}</td>
          <td><span class="status ${tx.status}">${tx.status}</span></td>
          <td><small>${new Date(tx.date).toLocaleString()}</small></td>
        `;
        row.style.cursor = "pointer";
        if (tx.transaction_ref) {
          row.addEventListener("click", () => {
            window.location.href = `/receipt/${tx.transaction_ref}`;
          });
        }
        tbody.appendChild(row);
      });
    }

    function applyFilters() {
      const type   = document.getElementById("filterType").value;
      const status = document.getElementById("filterStatus").value;
      let filtered = allTransactions;
      if (type)   filtered = filtered.filter(tx => tx.type === type);
      if (status) filtered = filtered.filter(tx => tx.status === status);
      renderTransactions(filtered);
    }

    loadTransactions();

    // ── Socket.IO ──
    const socket = io();

    // Reload transactions when admin approves/rejects
    socket.on("transactionUpdated", () => loadTransactions());

    // ── Chat ──
    const chatIcon   = document.getElementById("chatIcon");
    const chatWindow = document.getElementById("chatWindow");
    const messagesDiv = document.getElementById("messages");
    const input      = document.getElementById("messageInput");
    const sendBtn    = document.getElementById("sendBtn");
    const badge      = document.getElementById("newMsgBadge");
    const closeChat  = document.getElementById("closeChat");

    let chatOpen    = false;
    let unreadCount = 0;

    chatIcon.addEventListener("click", () => {
      chatOpen = !chatOpen;
      if (chatOpen) {
        chatWindow.classList.add("open");
        badge.style.display = "none";
        unreadCount = 0;
      } else {
        chatWindow.classList.remove("open");
      }
    });

    closeChat.addEventListener("click", () => {
      chatOpen = false;
      chatWindow.classList.remove("open");
    });

    async function loadHistory(email) {
      const res  = await fetch(`/chat/${encodeURIComponent(email)}`);
      const data = await res.json();
      if (data.success) {
        messagesDiv.innerHTML = "";
        data.messages.forEach(msg => {
          const p = document.createElement("p");
          p.className = "message " + (msg.sender === "admin" ? "admin" : "user");
          p.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text} <small>${new Date(msg.timestamp).toLocaleTimeString()}</small>`;
          messagesDiv.appendChild(p);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    }

    // ✅ userEmail from localStorage — no more "No email found in URL" alert
    if (userEmail) {
      loadHistory(userEmail);
      socket.emit("joinRoom", { email: userEmail, role: "user" });
    }

    socket.on("chatMessage", (msg) => {
      const p = document.createElement("p");
      p.className = "message " + (msg.sender === "admin" ? "admin" : "user");
      p.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text} <small>${new Date(msg.timestamp).toLocaleTimeString()}</small>`;
      messagesDiv.appendChild(p);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      if (!chatOpen) {
        unreadCount++;
        badge.style.display = "flex";
        badge.textContent = unreadCount;
        chatIcon.classList.add("bounce");
        setTimeout(() => chatIcon.classList.remove("bounce"), 4000);
      }
    });

    sendBtn.addEventListener("click", () => {
      const text = input.value.trim();
      if (!text) return;
      socket.emit("chatMessage", { text, sender: userEmail, receiver: "admin" });
      input.value = "";
    });

    input.addEventListener("keypress", e => {
      if (e.key === "Enter") sendBtn.click();
    });
  </script>

</body>
</html>
